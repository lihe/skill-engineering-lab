<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill Engineering Lab torn-paper collage poster</title>
  <desc id="desc">A torn-paper editorial collage poster for Skill Engineering Lab, showing write, evaluate, govern, provider adapter, version diff, and benchmark evidence.</desc>
  <defs>
    <filter id="paper" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.15"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
      <feDropShadow dx="0" dy="16" stdDeviation="11" flood-color="#171717" flood-opacity="0.18"/>
    </filter>
    <filter id="ink">
      <feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="2" seed="12" result="grain"/>
      <feComposite in="grain" in2="SourceAlpha" operator="in"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.04 0 0 0 0 0.04 0 0 0 0 0.04 0 0 0 0.18 0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="stamp">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="18"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#111827" opacity="0.12"/>
    </pattern>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#ede3cf"/>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.65"/>
  <path d="M-40 62C170 18 334 92 522 38C722-20 944 50 1130 22C1318-6 1460 48 1648 24V196H-40Z" fill="#171717" opacity="0.92"/>
  <path d="M-64 748C174 706 340 792 546 744C718 704 894 736 1052 714C1264 684 1420 764 1664 706V930H-64Z" fill="#111827" opacity="0.92"/>

  <g filter="url(#paper)">
    <path d="M116 116L398 70L494 222L186 292Z" fill="#fff7e6"/>
    <path d="M54 320L356 286L448 440L76 482Z" fill="#f9f0d8"/>
    <path d="M1166 84L1516 124L1480 292L1126 242Z" fill="#fff7e6"/>
    <path d="M1164 326L1508 300L1544 468L1120 498Z" fill="#e9f5ff"/>
    <path d="M96 696L442 642L516 800L70 844Z" fill="#1665ad"/>
    <path d="M972 676L1378 636L1448 820L916 846Z" fill="#ffffff"/>
  </g>

  <g filter="url(#paper)">
    <path d="M336 192L1054 118L1252 412L288 534L232 314Z" fill="#faf7ed"/>
    <path d="M286 542L1062 476L1178 658L344 720Z" fill="#fffaf0"/>
    <path d="M676 356L1100 328L1130 426L646 468Z" fill="#d8ff18" opacity="0.96"/>
    <path d="M462 86L828 56L874 118L436 154Z" fill="#1388d3"/>
    <path d="M1116 492L1478 454L1514 586L1076 628Z" fill="#d8ff18"/>
    <path d="M1124 616L1452 596L1488 726L1100 746Z" fill="#101820"/>
  </g>

  <g font-family="Impact, Haettenschweiler, 'Arial Black', sans-serif" filter="url(#ink)">
    <text x="402" y="302" font-size="132" fill="#111111" letter-spacing="1">SKILL</text>
    <text x="398" y="422" font-size="118" fill="#111111" letter-spacing="1">ENGINEERING</text>
    <text x="398" y="542" font-size="132" fill="#111111" letter-spacing="1">LAB</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="488" y="110" font-size="35" fill="#07111f" font-weight="800" transform="rotate(-5 488 110)">EVALUATE. IMPROVE. SHIP.</text>
    <text x="690" y="418" font-size="26" fill="#111827" font-weight="800" transform="rotate(-2 690 418)">让每个 Skill 都可验证、可进化、可沉淀为团队资产</text>
    <text x="112" y="162" font-size="20" fill="#991b1b" font-weight="900">MISSION</text>
    <text x="112" y="206" font-size="26" fill="#111827" font-weight="800">Turn prompts into</text>
    <text x="112" y="242" font-size="26" fill="#111827" font-weight="800">reliable skills.</text>
    <text x="112" y="392" font-size="23" fill="#111827" font-weight="800">SKILL AS CODE</text>
    <text x="128" y="432" font-size="18" fill="#111827">☑ Description</text>
    <text x="128" y="464" font-size="18" fill="#111827">☑ References</text>
    <text x="128" y="496" font-size="18" fill="#111827">☑ Scripts &amp; Guards</text>
    <text x="128" y="528" font-size="18" fill="#111827">☑ Evaluation Cases</text>
    <text x="1198" y="178" font-size="18" fill="#111827">SKL-LAB-2026</text>
    <text x="1280" y="248" font-size="40" fill="#111827" font-weight="900">PASS</text>
    <text x="1280" y="316" font-size="66" fill="#111827" font-weight="900">100%</text>
    <text x="1278" y="408" font-size="32" fill="#111827" font-weight="900">OVER TRIGGER</text>
    <text x="1278" y="468" font-size="56" fill="#111827" font-weight="900">0%</text>
    <text x="1162" y="542" font-size="30" fill="#111827" font-weight="900">VERSION DIFF</text>
    <text x="1162" y="586" font-size="20" fill="#111827">看得见的进化轨迹</text>
    <text x="1130" y="666" font-size="29" fill="#d8ff18" font-weight="900">PROVIDER ADAPTER</text>
    <text x="1130" y="706" font-size="19" fill="#ffffff">Mock / OpenAI / Anthropic</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-weight="800">
    <path d="M426 634H586" stroke="#111827" stroke-width="8"/>
    <path d="M568 614L606 634L568 654" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M776 634H936" stroke="#111827" stroke-width="8"/>
    <path d="M918 614L956 634L918 654" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="310" y="618" font-size="23" fill="#111827">WITHOUT_SKILL</text>
    <text x="632" y="618" font-size="23" fill="#0f4f91">WITH_SKILL_V1</text>
    <text x="984" y="618" font-size="23" fill="#365314">WITH_SKILL_V2</text>

    <rect x="302" y="650" width="190" height="82" rx="18" fill="#dad2c2"/>
    <text x="326" y="682" font-size="17" fill="#111827">× 风格泛</text>
    <text x="326" y="712" font-size="17" fill="#111827">× 结构散</text>
    <rect x="630" y="650" width="190" height="82" rx="18" fill="#d9eafe"/>
    <text x="654" y="682" font-size="17" fill="#111827">☑ 结构完整</text>
    <text x="654" y="712" font-size="17" fill="#111827">△ 仍有误触发</text>
    <rect x="984" y="650" width="190" height="82" rx="18" fill="#edfcca"/>
    <text x="1008" y="682" font-size="17" fill="#111827">☑ 稳定触发</text>
    <text x="1008" y="712" font-size="17" fill="#111827">☑ 通过率↑</text>
  </g>

  <g>
    <rect x="94" y="718" width="342" height="92" fill="url(#grid)" opacity="0.95"/>
    <polyline points="118,786 154,756 202,770 248,734 298,746 340,716 404,732" fill="none" stroke="#d8ff18" stroke-width="6"/>
    <polyline points="118,812 154,798 202,802 248,774 298,790 340,764 404,770" fill="none" stroke="#07111f" stroke-width="5"/>
    <text x="118" y="690" fill="#ffffff" font-family="ui-monospace, Menlo, monospace" font-size="24" font-weight="900">BENCHMARK &amp; TRACES</text>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" filter="url(#stamp)">
    <circle cx="294" cy="318" r="84" fill="none" stroke="#a02828" stroke-width="6" stroke-dasharray="10 8"/>
    <text x="232" y="308" fill="#a02828" font-size="27" font-weight="900" transform="rotate(-8 232 308)">ENGINEERED</text>
    <text x="246" y="350" fill="#a02828" font-size="36" font-weight="900" transform="rotate(-8 246 350)">SKILL</text>
    <rect x="1330" y="130" width="156" height="52" fill="none" stroke="#b91c1c" stroke-width="4"/>
    <text x="1346" y="164" fill="#b91c1c" font-size="22" font-weight="900">BUILD · TEST · GOVERN</text>
  </g>

  <g opacity="0.95">
    <path d="M144 78L188 70L194 92L150 100Z" fill="#1388d3"/>
    <path d="M184 696L230 686L236 758L190 770Z" fill="#ef2b24"/>
    <path d="M1054 744L1108 734L1116 798L1064 812Z" fill="#1388d3"/>
    <path d="M826 372L1042 350L1048 386L830 408Z" fill="#d8ff18"/>
    <path d="M1164 500L1430 468L1438 504L1172 536Z" fill="#1388d3"/>
  </g>
</svg>
