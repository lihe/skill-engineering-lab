<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Skill Engineering Lab Dashboard</title>
    <link rel="stylesheet" href="/dashboard/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div>
          <p class="eyebrow">AI Agent Skill Evaluation</p>
          <h1>Skill Engineering Lab</h1>
        </div>
      </div>
      <div class="run-meta" id="runMeta"></div>
      <nav class="top-links" aria-label="项目入口">
        <a href="/site">研究站</a>
        <a href="/docs/ai-agent-skill-engineering">方法论</a>
      </nav>
    </header>

    <main>
      <section class="summary-band" aria-labelledby="summaryTitle">
        <div>
          <p class="eyebrow">工程化闭环</p>
          <h2 id="summaryTitle">从一次性提示词，到可评测、可回归、可治理的能力资产</h2>
        </div>
        <div class="flow-strip" aria-label="Skill 生命周期">
          <span>编写</span>
          <i></i>
          <span>评测</span>
          <i></i>
          <span>归因</span>
          <i></i>
          <span>治理</span>
        </div>
      </section>

      <section class="metric-grid" id="headlineMetrics" aria-label="核心指标"></section>

      <section class="dashboard-grid">
        <article class="panel wide">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">三态对照</p>
              <h2>质量、触发与成本</h2>
            </div>
            <a href="/report.md">查看报告</a>
          </div>
          <div class="comparison-table-wrap">
            <table class="comparison-table" id="metricTable"></table>
          </div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Lift</p>
              <h2>v2 相对收益</h2>
            </div>
          </div>
          <div class="lift-stack" id="liftStack"></div>
        </article>

        <article class="panel wide">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Failure Taxonomy</p>
              <h2>失败模式收敛</h2>
            </div>
          </div>
          <div class="pattern-chart" id="patternChart"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Case Design</p>
              <h2>样例分布</h2>
            </div>
          </div>
          <div class="case-type-list" id="caseTypes"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Badcase</p>
              <h2>v1 主要失败样例</h2>
            </div>
          </div>
          <div class="badcase-list" id="badcaseList"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Governance</p>
              <h2>治理资产</h2>
            </div>
          </div>
          <div class="governance-list" id="governanceList"></div>
        </article>

        <article class="panel full">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Case Matrix</p>
              <h2>样例级回归视图</h2>
            </div>
          </div>
          <div class="case-matrix" id="caseMatrix"></div>
        </article>
      </section>
    </main>

    <script src="/dashboard/data.js"></script>
    <script src="/dashboard/app.js"></script>
  </body>
</html>
