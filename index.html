<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=./site/index.html" />
    <title>Skill Engineering Lab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --ink: #111827;
        --muted: #5d6878;
        --line: #d8e0ea;
        --blue: #2563eb;
        --teal: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background:
          linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 34%),
          linear-gradient(315deg, rgba(15, 118, 110, 0.1), transparent 42%),
          var(--bg);
        color: var(--ink);
      }

      main {
        width: min(680px, 100%);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        padding: 36px;
        box-shadow: 0 22px 55px rgba(15, 23, 42, 0.09);
      }

      .eyebrow {
        margin: 0 0 14px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--teal);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.8;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 24px;
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid var(--blue);
        background: var(--blue);
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Agent Skill Engineering</p>
      <h1>Skill Engineering Lab</h1>
      <p>正在进入研究型项目站。若浏览器没有自动跳转，请点击下方入口。</p>
      <a href="./site/index.html">打开项目站点</a>
    </main>
  </body>
</html>
